<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>상품 수정 - Jueun Mall</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #ffffff; }
        .navbar-custom { background-color: #000000; padding: 15px 0; }
        .navbar-brand { font-weight: 900; letter-spacing: 2px; font-size: 1.5rem; }
        .auth-container { max-width: 500px; margin: 80px auto 150px; }
        .page-title { font-weight: 900; letter-spacing: 1px; font-size: 2rem; }
        .form-control { border-radius: 0; padding: 12px 15px; border: 1px solid #e0e0e0; font-size: 0.95rem; }
        .form-control:focus { border-color: #000; box-shadow: none; }
        .form-label { font-size: 0.85rem; font-weight: 700; color: #333; }
        .btn-custom-dark { background-color: #000; color: #fff; border-radius: 0; font-weight: 700; padding: 13px; letter-spacing: 1px; }
        .btn-custom-dark:hover { background-color: #333; color: #fff; }
        .btn-custom-outline { border: 1px solid #ddd; color: #000; border-radius: 0; padding: 13px; }
        .btn-custom-outline:hover { border-color: #000; background-color: #f8f8f8; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark navbar-custom mb-5">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand text-white" href="/">JUEUN MALL</a>
        <span class="text-white" style="font-size: 0.9rem;">관리자 페이지</span>
    </div>
</nav>

<div class="container auth-container">
    <h2 class="page-title mb-1">EDIT PRODUCT</h2>
    <p class="text-muted mb-4" style="font-size: 0.85rem;">수정 후 저장하면 Redis 캐시가 자동으로 무효화됩니다.</p>

    <form th:action="@{/admin/products/{id}/edit(id=${product.id})}" method="post">
        <div class="mb-3">
            <label class="form-label">상품명</label>
            <input type="text" class="form-control" name="name" th:value="${product.name}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">가격</label>
            <input type="number" class="form-control" name="price" th:value="${product.price}" required>
        </div>
        <div class="mb-3">
            <label class="form-label">카테고리</label>
            <select class="form-control" name="category">
                <option th:selected="${product.category == '상의'}" value="상의">상의</option>
                <option th:selected="${product.category == '하의'}" value="하의">하의</option>
                <option th:selected="${product.category == '아우터'}" value="아우터">아우터</option>
                <option th:selected="${product.category == '신발'}" value="신발">신발</option>
                <option th:selected="${product.category == '악세서리'}" value="악세서리">악세서리</option>
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">재고 수량</label>
            <input type="number" class="form-control" name="stockQuantity" th:value="${product.stockQuantity}" required>
        </div>
        <div class="mb-4">
            <label class="form-label">상품 설명</label>
            <textarea class="form-control" name="description" rows="4"
                      th:text="${product.description}"></textarea>
        </div>
        <div class="d-grid gap-2">
            <button type="submit" class="btn btn-custom-dark">저장하기</button>
            <a href="/admin" class="btn btn-custom-outline text-center">취소</a>
        </div>
    </form>
</div>

</body>
</html>
