<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>로그인 - Jueun Mall</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

        body { font-family: 'Noto Sans KR', sans-serif; background-color: #ffffff; }
        .navbar-custom { background-color: #000000; padding: 15px 0; }
        .navbar-brand { font-weight: 900; letter-spacing: 2px; font-size: 1.5rem; }

        .auth-container { max-width: 400px; margin: 100px auto 150px; }
        .auth-title { font-weight: 900; letter-spacing: 2px; font-size: 2rem; }

        .form-control {
            border-radius: 0; padding: 14px 15px;
            border: 1px solid #e0e0e0; font-size: 0.95rem;
        }
        .form-control:focus { border-color: #000; box-shadow: none; }

        .btn-custom-dark {
            background-color: #000; color: #fff; border-radius: 0;
            font-weight: 700; padding: 14px; letter-spacing: 1px;
        }
        .btn-custom-dark:hover { background-color: #333; color: #fff; }

        .sub-link { font-size: 0.9rem; color: #777; text-decoration: none; }
        .sub-link:hover { color: #000; text-decoration: underline; }

        .divider-text {
            text-align: center; position: relative; margin: 24px 0;
            color: #ccc; font-size: 0.8rem;
        }
        .divider-text::before, .divider-text::after {
            content: ''; position: absolute; top: 50%;
            width: 44%; height: 1px; background: #e0e0e0;
        }
        .divider-text::before { left: 0; }
        .divider-text::after { right: 0; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark navbar-custom">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand text-white" href="/">JUEUN MALL</a>
    </div>
</nav>

<div class="container auth-container">
    <h2 class="text-center auth-title mb-5">LOGIN</h2>

    <div th:if="${param.registered}"
         class="alert alert-dark rounded-0 mb-4 text-center fw-bold"
         style="font-size: 0.9rem; border: 1px solid #000;">
        회원가입이 완료되었습니다! 로그인해주세요.
    </div>
    <div th:if="${param.error}" class="alert alert-danger rounded-0 mb-4" style="font-size: 0.9rem;">
        이메일 또는 비밀번호를 다시 확인해주세요.
    </div>

    <form action="/login" method="post">
        <div class="mb-3">
            <input type="email" class="form-control" name="email" placeholder="이메일 아이디" required>
        </div>
        <div class="mb-4">
            <input type="password" class="form-control" name="password" placeholder="비밀번호" required>
        </div>
        <button type="submit" class="btn btn-custom-dark w-100 mb-4">로그인</button>
    </form>

    <div class="divider-text">OR</div>

    <div class="text-center mt-3">
        <span class="text-muted" style="font-size: 0.9rem;">아직 회원이 아니신가요?</span>
        <a href="/signup" class="sub-link fw-bold ms-2">회원가입</a>
    </div>
</div>

</body>
</html>
