<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - Jueun Mall</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

        body { font-family: 'Noto Sans KR', sans-serif; background-color: #ffffff; }
        .navbar-custom { background-color: #000000; padding: 15px 0; }
        .navbar-brand { font-weight: 900; letter-spacing: 2px; font-size: 1.5rem; }

        .auth-container { max-width: 400px; margin: 100px auto 150px; }
        .auth-title { font-weight: 900; letter-spacing: 2px; font-size: 2rem; }

        .form-control {
            border-radius: 0; padding: 14px 15px;
            border: 1px solid #e0e0e0; font-size: 0.95rem;
        }
        .form-control:focus { border-color: #000; box-shadow: none; }

        .btn-custom-dark {
            background-color: #000; color: #fff; border-radius: 0;
            font-weight: 700; padding: 14px; letter-spacing: 1px;
        }
        .btn-custom-dark:hover { background-color: #333; color: #fff; }

        .form-check-input:checked { background-color: #000; border-color: #000; }
        .form-check-input { border-radius: 0 !important; }
        .form-check-label { font-size: 0.85rem; color: #555; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark navbar-custom">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand text-white" href="/">JUEUN MALL</a>
    </div>
</nav>

<div class="container auth-container">
    <h2 class="text-center auth-title mb-5">JOIN US</h2>

    <div th:if="${param.error}" class="alert alert-danger rounded-0 mb-4" style="font-size: 0.9rem;">
        이미 존재하는 이메일입니다. 다른 이메일로 다시 시도해주세요.
    </div>

    <form action="/signup" method="post">
        <div class="mb-3">
            <input type="email" class="form-control" name="email" placeholder="사용할 이메일 주소" required>
        </div>
        <div class="mb-3">
            <input type="password" class="form-control" name="password" placeholder="비밀번호" required>
        </div>
        <div class="mb-4">
            <input type="text" class="form-control" name="name" placeholder="이름" required>
        </div>

        <div class="mb-4">
            <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" id="agreeAll" required>
                <label class="form-check-label fw-bold text-dark" for="agreeAll">전체 동의</label>
            </div>
            <div class="form-check ms-2 mb-1">
                <input class="form-check-input" type="checkbox" id="agreeTerms" required>
                <label class="form-check-label" for="agreeTerms">[필수] 이용약관 동의</label>
            </div>
            <div class="form-check ms-2">
                <input class="form-check-input" type="checkbox" id="agreePrivacy" required>
                <label class="form-check-label" for="agreePrivacy">[필수] 개인정보 수집 및 이용 동의</label>
            </div>
        </div>

        <button type="submit" class="btn btn-custom-dark w-100">회원가입 완료</button>
    </form>

    <div class="text-center mt-4">
        <span class="text-muted" style="font-size: 0.9rem;">이미 회원이신가요?</span>
        <a href="/login" style="font-size: 0.9rem; color: #000; font-weight: 700; text-decoration: none; margin-left: 8px;">로그인</a>
    </div>
</div>

</body>
</html>
