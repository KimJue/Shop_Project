<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Jueun Mall</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

        body { font-family: 'Noto Sans KR', sans-serif; background-color: #ffffff; }

        .navbar-custom { background-color: #000000; padding: 15px 0; }
        .navbar-brand { font-weight: 900; letter-spacing: 2px; font-size: 1.5rem; }

        .btn-custom-dark {
            background-color: #000000; color: #ffffff;
            border-radius: 0; font-weight: 700; letter-spacing: 1px;
        }
        .btn-custom-dark:hover { background-color: #333333; color: #ffffff; }

        /* 히어로 */
        .hero-section { background-color: #f4f4f4; padding: 120px 0; text-align: center; }
        .hero-title { font-size: 3.5rem; font-weight: 900; letter-spacing: -1px; line-height: 1.1; }
        .hero-sub { font-size: 1rem; color: #777; letter-spacing: 1px; }

        /* 섹션 타이틀 */
        .section-title { font-weight: 900; font-size: 1.3rem; letter-spacing: 1px; }

        /* 신상품 카드 */
        .product-card { border: none; transition: transform 0.2s ease; cursor: pointer; }
        .product-card:hover { transform: translateY(-4px); }
        .product-card img { aspect-ratio: 3/4; object-fit: cover; width: 100%; }
        .brand-text { font-size: 0.78rem; font-weight: 700; color: #555; }
        .product-title { font-size: 0.9rem; color: #111; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .product-price { font-size: 1rem; font-weight: 700; color: #000; }

        /* 배너 스트립 */
        .banner-strip { background-color: #000; color: #fff; padding: 40px 0; text-align: center; }
        .banner-strip h2 { font-weight: 900; font-size: 2rem; letter-spacing: 2px; margin-bottom: 8px; }
        .banner-strip p { color: #aaa; font-size: 0.9rem; margin-bottom: 20px; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark navbar-custom">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand text-white" href="/">JUEUN MALL</a>
        <div class="d-flex align-items-center">
            <div th:if="${session.loggedInUserEmail == null}">
                <a href="/login" class="btn text-white me-2">로그인</a>
                <a href="/signup" class="btn btn-outline-light rounded-0">회원가입</a>
            </div>
            <div th:if="${session.loggedInUserEmail != null}">
                <span class="text-white me-4" style="font-size: 0.9rem;" th:text="${session.loggedInUserName} + '님'"></span>
                <a href="/mypage" class="btn text-white me-2">마이페이지</a>
                <a href="/cart" class="btn text-white me-2">장바구니 🛒</a>
                <a href="/logout" class="btn btn-outline-light rounded-0" style="padding: 4px 12px; font-size: 0.8rem;">로그아웃</a>
            </div>
        </div>
    </div>
</nav>

<!-- 히어로 -->
<div class="hero-section">
    <div class="container">
        <p class="hero-sub mb-3">2025 SUMMER COLLECTION</p>
        <h1 class="hero-title mb-4"
            th:utext="${session.loggedInUserEmail != null} ? ${session.loggedInUserName} + '님,<br>환영합니다.' : 'JUEUN<br>STANDARD'">
        </h1>
        <p class="text-muted mb-5"
           th:text="${session.loggedInUserEmail != null} ? '당신을 위한 새로운 트렌드를 만나보세요.' : '미니멀리즘의 완성, 지금 바로 경험하세요.'">
        </p>
        <a href="/products" class="btn btn-custom-dark btn-lg px-5 py-3">SHOP NOW</a>
    </div>
</div>

<!-- 중간 배너 -->
<div class="banner-strip my-0">
    <div class="container">
        <h2>NEW ARRIVALS</h2>
        <p>매주 업데이트되는 신상품을 확인하세요</p>
        <a href="/products" class="btn btn-outline-light rounded-0 px-4">전체보기</a>
    </div>
</div>

</body>
</html>
