<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>결제 완료 - Jueun Mall</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

        body { font-family: 'Noto Sans KR', sans-serif; background-color: #ffffff; }

        .navbar-custom { background-color: #000000; padding: 15px 0; }
        .navbar-brand { font-weight: 900; letter-spacing: 2px; font-size: 1.5rem; }

        .success-container { max-width: 500px; margin: 120px auto 150px; text-align: center; }
        .success-title { font-weight: 900; letter-spacing: 1px; font-size: 2rem; }

        .divider { border-top: 3px solid #000; margin: 30px 0; }

        .btn-custom-dark {
            background-color: #000000; color: #ffffff;
            border-radius: 0; font-weight: 700;
            padding: 14px 32px; letter-spacing: 1px;
        }
        .btn-custom-dark:hover { background-color: #333333; color: #ffffff; }

        .btn-custom-outline {
            border: 1px solid #dddddd; color: #000000;
            border-radius: 0; padding: 14px 32px;
        }
        .btn-custom-outline:hover { border-color: #000000; background-color: #f8f8f8; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark navbar-custom">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand text-white" href="/">JUEUN MALL</a>
    </div>
</nav>

<div class="container success-container">
    <p style="font-size: 3rem; margin-bottom: 16px;">✓</p>
    <h2 class="success-title mb-3">ORDER COMPLETE</h2>
    <div class="divider"></div>
    <p class="text-muted mb-5" style="font-size: 0.95rem; line-height: 1.8;">
        주문이 성공적으로 완료되었습니다.<br>
        상품을 안전하게 배송해 드리겠습니다.
    </p>
    <div class="d-flex justify-content-center gap-3">
        <a href="/mypage" class="btn btn-custom-dark">주문 내역 보기</a>
        <a href="/products" class="btn btn-custom-outline">쇼핑 계속하기</a>
    </div>
</div>

</body>
</html>
