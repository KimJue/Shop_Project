<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>마이페이지 - Jueun Mall</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

        body { font-family: 'Noto Sans KR', sans-serif; background-color: #ffffff; }

        .navbar-custom { background-color: #000000; padding: 15px 0; }
        .navbar-brand { font-weight: 900; letter-spacing: 2px; font-size: 1.5rem; }

        .page-title { font-weight: 900; letter-spacing: 1px; font-size: 2rem; }

        /* 요약 카드 */
        .summary-card {
            border: 1px solid #e0e0e0; padding: 24px 28px;
            display: flex; justify-content: space-around;
            margin-bottom: 40px;
        }
        .summary-item { text-align: center; }
        .summary-num { font-size: 1.8rem; font-weight: 900; color: #000; }
        .summary-label { font-size: 0.8rem; color: #888; margin-top: 4px; }

        .order-table { border-top: 3px solid #000; border-bottom: 1px solid #000; }
        .order-table th {
            background-color: #fafafa; border-bottom: 1px solid #e0e0e0;
            font-weight: 500; color: #333; padding: 15px 12px;
        }
        .order-table td {
            vertical-align: middle; border-bottom: 1px solid #f0f0f0; padding: 20px 12px;
        }

        .order-name { font-weight: 700; font-size: 1.0rem; }
        .price-text { font-weight: 700; color: #000; }
        .empty-order { padding: 100px 0; text-align: center; color: #777; }

        .btn-custom-outline { border: 1px solid #ddd; color: #000; border-radius: 0; }
        .btn-custom-outline:hover { border-color: #000; background-color: #f8f8f8; }

        .badge-status { display: inline-block; padding: 4px 10px; font-size: 0.78rem; font-weight: 500; }
        .badge-ORDERED   { background-color: #e8f0fe; color: #1a56cc; }
        .badge-SHIPPING  { background-color: #fff4e0; color: #b06000; }
        .badge-DELIVERED { background-color: #e6f4ea; color: #1e6e3a; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark navbar-custom mb-5">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand text-white" href="/">JUEUN MALL</a>
        <div class="d-flex align-items-center">
            <span class="text-white me-4" style="font-size: 0.9rem;"
                  th:text="${session.loggedInUserName} + '님'"></span>
            <a href="/cart" class="btn text-white me-2">장바구니 🛒</a>
            <a href="/logout" class="btn btn-outline-light rounded-0"
               style="padding: 4px 12px; font-size: 0.8rem;">로그아웃</a>
        </div>
        <div th:if="${session.loggedInUserEmail != null}">
    <span class="text-white me-4" style="font-size: 0.9rem;"
          th:text="${session.loggedInUserName} + '님'"></span>
            <a th:if="${session.loggedInUserRole == 'ADMIN'}"
               href="/admin" class="btn text-white me-2">관리자 ⚙️</a>
            <a href="/coupons" class="btn text-white me-2">쿠폰 🎟️</a>
            <a href="/mypage" class="btn text-white me-2">마이페이지</a>
            <a href="/cart" class="btn text-white me-2">장바구니 🛒</a>
            <a href="/logout" class="btn btn-outline-light rounded-0"
               style="padding: 4px 12px; font-size: 0.8rem;">로그아웃</a>
        </div>
    </div>
</nav>

<div class="container mb-5" style="max-width: 1000px;">
    <h2 class="page-title mb-1">ORDER HISTORY</h2>
    <p class="text-muted mb-4">고객님의 주문 내역을 확인하실 수 있습니다.</p>

    <!-- 주문 요약 카드 -->
    <div class="summary-card" th:unless="${#lists.isEmpty(orders)}">
        <div class="summary-item">
            <div class="summary-num" th:text="${#lists.size(orders)}">0</div>
            <div class="summary-label">전체 주문</div>
        </div>
        <div class="summary-item">
            <div class="summary-num" th:text="${shippingCount}">0</div>
            <div class="summary-label">배송 중</div>
        </div>
        <div class="summary-item">
            <div class="summary-num" th:text="${deliveredCount}">0</div>
            <div class="summary-label">배송 완료</div>
        </div>
    </div>

    <!-- 주문 내역 없을 때 -->
    <div th:if="${#lists.isEmpty(orders)}"
         class="empty-order border-top border-bottom border-dark border-3">
        <h5 class="mb-4">주문 내역이 없습니다.</h5>
        <a href="/products" class="btn btn-custom-outline px-4 py-2">상품 둘러보기</a>
    </div>

    <!-- 주문 내역 있을 때 -->
    <div th:unless="${#lists.isEmpty(orders)}">
        <table class="table text-center order-table mb-4">
            <thead>
            <tr>
                <th style="width: 20%; text-align: left;">주문일자</th>
                <th style="width: 45%; text-align: left;">주문상품명</th>
                <th style="width: 15%;">결제금액</th>
                <th style="width: 20%;">배송상태</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="order : ${orders}">
                <td class="text-muted text-start"
                    th:text="${#temporals.format(order.orderDate, 'yyyy-MM-dd HH:mm')}"></td>
                <td class="text-start order-name" th:text="${order.orderName}"></td>
                <td class="price-text"
                    th:text="${#numbers.formatInteger(order.totalAmount, 0, 'COMMA')} + '원'"></td>
                <td>
                    <span class="badge-status"
                          th:classappend="'badge-' + ${order.status.name()}"
                          th:text="${order.status == T(com.example.Shop.domain.OrderStatus).ORDERED   ? '주문완료' :
                                     order.status == T(com.example.Shop.domain.OrderStatus).SHIPPING  ? '배송 중' :
                                                                                                        '배송완료'}">
                    </span>
                </td>
            </tr>
            </tbody>
        </table>
        <a href="/products" class="btn btn-custom-outline px-4 py-2">← 쇼핑 계속하기</a>
    </div>
</div>

</body>
</html>
