<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>장바구니 - Jueun Mall</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

        body { font-family: 'Noto Sans KR', sans-serif; background-color: #ffffff; }

        .navbar-custom { background-color: #000000; padding: 15px 0; }
        .navbar-brand { font-weight: 900; letter-spacing: 2px; font-size: 1.5rem; }

        .btn-custom-dark { background-color: #000; color: #fff; border-radius: 0; font-weight: 500; }
        .btn-custom-dark:hover { background-color: #333; color: #fff; }
        .btn-custom-outline { border: 1px solid #ddd; color: #000; border-radius: 0; background: #fff; }
        .btn-custom-outline:hover { border-color: #000; background-color: #f8f8f8; }

        .page-title { font-weight: 900; letter-spacing: 1px; font-size: 2rem; }

        .cart-table { border-top: 3px solid #000; border-bottom: 1px solid #000; }
        .cart-table th {
            background-color: #fafafa; border-bottom: 1px solid #e0e0e0;
            font-weight: 500; color: #333; padding: 15px 0;
        }
        .cart-table td {
            vertical-align: middle; border-bottom: 1px solid #f0f0f0; padding: 20px 0;
        }

        /* 주문 요약 박스 */
        .order-summary {
            border: 1px solid #e0e0e0;
            padding: 28px;
            position: sticky;
            top: 20px;
        }
        .summary-title { font-weight: 900; font-size: 1rem; letter-spacing: 1px; margin-bottom: 20px; }
        .summary-row { display: flex; justify-content: space-between; font-size: 0.9rem; margin-bottom: 12px; color: #555; }
        .summary-total { display: flex; justify-content: space-between; font-weight: 900; font-size: 1.1rem; border-top: 1px solid #000; padding-top: 16px; margin-top: 16px; }

        .empty-cart { padding: 100px 0; text-align: center; color: #777; }
        .price-text { font-weight: 700; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark navbar-custom mb-5">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand text-white" href="/">JUEUN MALL</a>
        <div class="d-flex align-items-center">
            <span class="text-white me-4" style="font-size: 0.9rem;"
                  th:text="${session.loggedInUserName} + '님'"></span>
            <a href="/mypage" class="btn text-white me-2">마이페이지</a>
            <a href="/logout" class="btn btn-outline-light rounded-0"
               style="padding: 4px 12px; font-size: 0.8rem;">로그아웃</a>
        </div>
        <div th:if="${session.loggedInUserEmail != null}">
    <span class="text-white me-4" style="font-size: 0.9rem;"
          th:text="${session.loggedInUserName} + '님'"></span>
            <a th:if="${session.loggedInUserRole == 'ADMIN'}"
               href="/admin" class="btn text-white me-2">관리자 ⚙️</a>
            <a href="/coupons" class="btn text-white me-2">쿠폰 🎟️</a>
            <a href="/mypage" class="btn text-white me-2">마이페이지</a>
            <a href="/cart" class="btn text-white me-2">장바구니 🛒</a>
            <a href="/logout" class="btn btn-outline-light rounded-0"
               style="padding: 4px 12px; font-size: 0.8rem;">로그아웃</a>
        </div>
    </div>
</nav>

<div class="container mb-5" style="max-width: 1100px;">
    <h2 class="page-title mb-4">SHOPPING CART</h2>

    <!-- 장바구니 비었을 때 -->
    <div th:if="${#lists.isEmpty(cartItems)}"
         class="empty-cart border-top border-bottom border-dark border-3">
        <h5 class="mb-4">장바구니에 담긴 상품이 없습니다.</h5>
        <a href="/products" class="btn btn-custom-outline px-4 py-2">상품 담으러 가기</a>
    </div>

    <!-- 장바구니 있을 때 -->
    <div th:unless="${#lists.isEmpty(cartItems)}" class="row g-5">
        <!-- 상품 목록 -->
        <div class="col-lg-8">
            <table class="table text-center cart-table mb-4">
                <thead>
                <tr>
                    <th style="width: 40%; text-align: left;" class="ps-3">상품정보</th>
                    <th style="width: 15%;">판매가</th>
                    <th style="width: 15%;">수량</th>
                    <th style="width: 15%;">결제금액</th>
                    <th style="width: 15%;">선택</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="item : ${cartItems}">
                    <td class="text-start ps-3 fw-bold" th:text="${item.product.name}">상품명</td>
                    <td th:text="${#numbers.formatInteger(item.product.price, 0, 'COMMA')} + '원'">가격</td>
                    <td th:text="${item.quantity} + '개'">수량</td>
                    <td class="price-text text-danger"
                        th:text="${#numbers.formatInteger(item.product.price * item.quantity, 0, 'COMMA')} + '원'">
                    </td>
                    <td>
                        <form th:action="@{/cart/delete}" method="post" style="display:inline;">
                            <input type="hidden" name="cartItemId" th:value="${item.id}">
                            <button type="submit"
                                    class="btn btn-outline-secondary btn-sm rounded-0">삭제</button>
                        </form>
                    </td>
                </tr>
                </tbody>
            </table>
            <a href="/products" class="btn btn-custom-outline px-4 py-2">← 쇼핑 계속하기</a>
        </div>

        <!-- 주문 요약 -->
        <div class="col-lg-4">
            <div class="order-summary">
                <p class="summary-title">ORDER SUMMARY</p>
                <div class="summary-row">
                    <span>상품금액</span>
                    <span th:text="${#numbers.formatInteger(totalAmount, 0, 'COMMA')} + '원'">0원</span>
                </div>
                <div class="summary-row">
                    <span>배송비</span>
                    <span>무료</span>
                </div>
                <div class="summary-total">
                    <span>총 결제금액</span>
                    <span th:text="${#numbers.formatInteger(totalAmount, 0, 'COMMA')} + '원'">0원</span>
                </div>
                <form th:action="@{/order/checkout}" method="post" class="mt-4">
                    <button type="submit" class="btn btn-custom-dark w-100 py-3 fs-6">결제하기</button>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
